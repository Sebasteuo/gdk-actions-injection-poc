name: "PoC - Script Injection (replicates Xbox-GDK-Samples)"

on:
  pull_request:
    types: [opened, edited]

permissions:
  pull-requests: write
  contents: read

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - name: "VULNERABLE - Same pattern as Xbox-GDK-Samples line 159"
        uses: actions/github-script@v7
        with:
          script: |
            const title = '${{ github.event.pull_request.title }}';
            console.log('Title value: ' + title);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Workflow executed. Title was: ' + title
            });
